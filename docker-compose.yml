services:
  coder:
    image: ghcr.io/coder/coder:latest
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      CODER_HTTP_ADDRESS: "0.0.0.0:8080"
      CODER_ACCESS_URL: "${CODER_ACCESS_URL}"
      CODER_PG_CONNECTION_URL: "postgresql://${POSTGRES_USER:-coder}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-coder}?sslmode=disable"
      CODER_TELEMETRY_ENABLE: "false"
      # GitHub OAuth — restricted to theam org
      CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE: "true"
      CODER_OAUTH2_GITHUB_ALLOW_SIGNUPS: "true"
      CODER_OAUTH2_GITHUB_ALLOWED_ORGS: "theam"
    group_add:
      - "${DOCKER_GROUP_ID:-999}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-coder}
    volumes:
      - coder_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coder} -d ${POSTGRES_DB:-coder}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  coder_pgdata:
